services:
  rust-search:
    build:
      context: ./rust_search_service
      dockerfile: Dockerfile
    container_name: wiki-path-rust-search
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: wiki-path-api
    command: ["uvicorn", "api.main:app", "--host", "0.0.0.0", "--port", "8000"]
    env_file:
      - .env
    environment:
      - USE_RUST_SEARCH=${USE_RUST_SEARCH:-False}
      - RUST_SEARCH_URL=${RUST_SEARCH_URL:-http://rust-search:8081}
      - RUST_SEARCH_TIMEOUT=${RUST_SEARCH_TIMEOUT:-35}
    volumes:
      - reports_data:/app/reports
    ports:
      - "8000:8000"
    depends_on:
      - rust-search
    restart: unless-stopped

  #frontend:
    #build:
      #context: ./frontend
      #dockerfile: Dockerfile
    #container_name: wiki-path-frontend
    #depends_on:
      #- api
    #ports:
      #- "5173:5173"
    #restart: unless-stopped
    #profiles:
      #- frontend-local

  telegram-bot:
    build:
      context: .
      dockerfile: Dockerfile.python
    container_name: wiki-path-telegram-bot
    command: ["python", "-m", "telegram_bot.main"]
    env_file:
      - .env
    depends_on:
      - api
    restart: unless-stopped
    profiles:
      - bot

volumes:
  reports_data:
