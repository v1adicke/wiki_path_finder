server {
  listen 5173;
  listen [::]:5173;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  location / {
    # SPA fallback: direct requests like /dashboard should return index.html
    try_files $uri $uri/ /index.html;
  }

  location ~* \.(?:js|css|png|jpg|jpeg|gif|svg|ico|webp|woff2?)$ {
    expires 7d;
    add_header Cache-Control "public, max-age=604800";
    try_files $uri =404;
  }
}
